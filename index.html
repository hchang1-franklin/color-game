<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多人顏色選擇遊戲</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 登入介面 -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <h1>🎮 多人顏色選擇遊戲</h1>

            <div class="form-group">
                <label for="nicknameInput">玩家暱稱 <span class="required">*</span></label>
                <input type="text" id="nicknameInput" placeholder="請輸入你的暱稱" maxlength="20">
            </div>

            <div class="form-group">
                <label for="roomInput">房間號碼</label>
                <div class="room-row">
                    <input type="text" id="roomInput" placeholder="輸入房間號碼（7碼數字）" maxlength="7" inputmode="numeric">
                    <button class="btn btn-secondary" id="createRoomBtn">建立房間</button>
                </div>
            </div>

            <p class="error-msg" id="loginError"></p>

            <button class="btn btn-primary" id="enterGameBtn">進入遊戲</button>
        </div>
    </div>

    <!-- 遊戲介面 -->
    <div class="game-screen hidden" id="gameScreen">
        <div class="container">
            <div class="game-header">
                <h1>🎮 多人顏色選擇遊戲</h1>
                <div class="room-info">
                    <span>房間：<strong id="roomDisplay"></strong></span>
                    <span>玩家：<strong id="nicknameDisplay"></strong></span>
                </div>
            </div>

            <!-- 顏色選擇 -->
            <div class="color-selection-panel">
                <h2>選擇你的代表顏色</h2>
                <div class="color-options">
                    <button class="color-option" data-color="#FF7575" style="background:#FF7575;"></button>
                    <button class="color-option" data-color="#FF79BC" style="background:#FF79BC;"></button>
                    <button class="color-option" data-color="#97CBFF" style="background:#97CBFF;"></button>
                    <button class="color-option" data-color="#FFC78E" style="background:#FFC78E;"></button>
                </div>
                <div class="current-color-info">
                    當前顏色：<span id="currentColorSwatch" class="color-swatch"></span>
                    <span id="currentColorLabel">尚未選擇</span>
                </div>
            </div>

            <!-- 遊戲板 -->
            <div class="game-board" id="gameBoard">
                <!-- 10層樓由 JavaScript 動態生成 -->
            </div>

            <!-- 重設按鈕 -->
            <button class="btn btn-reset" id="resetBtn">🔄 重設</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
