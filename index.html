<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四人顏色競爭遊戲</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎮 四人顏色競爭遊戲</h1>
        
        <!-- 玩家選擇區 -->
        <div class="player-selection" id="playerSelection">
            <h2>請選擇你的顏色</h2>
            <div class="color-buttons">
                <button class="color-btn red" data-color="red" data-name="紅色">🔴 紅色</button>
                <button class="color-btn blue" data-color="blue" data-name="藍色">🔵 藍色</button>
                <button class="color-btn orange" data-color="orange" data-name="橘色">🟠 橘色</button>
                <button class="color-btn green" data-color="green" data-name="綠色">🟢 綠色</button>
            </div>
            <p class="hint">點擊選擇你的顏色，可以隨時更換</p>
        </div>

        <!-- 當前玩家顯示 -->
        <div class="current-player" id="currentPlayer">
            <span>當前顏色：</span>
            <span id="playerColorDisplay" class="color-display">未選擇</span>
        </div>

        <!-- 遊戲統計 -->
        <div class="game-stats">
            <div class="stat-item">
                <span>已填滿：</span>
                <span id="filledCount">0</span> / 40
            </div>
            <div class="stat-item">
                <span>進度：</span>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
        </div>

        <!-- 遊戲區域 -->
        <div class="game-board" id="gameBoard">
            <!-- 10層樓會由 JavaScript 動態生成 -->
        </div>

        <!-- 顏色統計 -->
        <div class="color-stats" id="colorStats">
            <h3>各顏色統計</h3>
            <div class="stats-grid">
                <div class="stat-card red">
                    <span class="stat-label">🔴 紅色</span>
                    <span class="stat-value" id="redCount">0</span>
                </div>
                <div class="stat-card blue">
                    <span class="stat-label">🔵 藍色</span>
                    <span class="stat-value" id="blueCount">0</span>
                </div>
                <div class="stat-card orange">
                    <span class="stat-label">🟠 橘色</span>
                    <span class="stat-value" id="orangeCount">0</span>
                </div>
                <div class="stat-card green">
                    <span class="stat-label">🟢 綠色</span>
                    <span class="stat-value" id="greenCount">0</span>
                </div>
            </div>
        </div>

        <!-- 重置按鈕 -->
        <button class="reset-btn" id="resetBtn">🔄 重新開始遊戲</button>
    </div>

    <!-- 遊戲結束模態框 -->
    <div class="modal" id="gameOverModal">
        <div class="modal-content">
            <h2>🎉 遊戲結束！</h2>
            <div id="winnerDisplay"></div>
            <button class="modal-btn" id="playAgainBtn">再玩一次</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
